name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check-rust:
    name: Rust check & clippy (Windows target)
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc
          components: clippy

      - name: Cache Cargo registry & build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            src-tauri/target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install Tauri system dependencies (Windows)
        # tauri-build requires WebView2, which ships with Windows 11 runners;
        # nothing extra to install on windows-latest.
        run: echo "No extra system deps required on Windows runner"

      - name: cargo check
        working-directory: src-tauri
        run: cargo check --target x86_64-pc-windows-msvc

      - name: cargo clippy
        working-directory: src-tauri
        run: cargo clippy --target x86_64-pc-windows-msvc -- -D warnings

      - name: cargo test (lib unit tests)
        working-directory: src-tauri
        # --lib targets the library crate only; no Windows device required.
        run: cargo test --lib --target x86_64-pc-windows-msvc

  check-frontend:
    name: Frontend build (Vite)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-npm-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build
