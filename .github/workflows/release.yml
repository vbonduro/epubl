name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-windows:
    name: Build & publish Windows installer
    runs-on: windows-latest
    permissions:
      contents: write # required to create GitHub Release and upload assets

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Cargo registry & build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            src-tauri/target/
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-release-
            ${{ runner.os }}-cargo-

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-npm-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-

      - name: Install frontend dependencies
        run: npm ci

      - name: Build, sign & publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Signing keypair generated with `cargo tauri signer generate`.
          # Store the private key in the TAURI_SIGNING_PRIVATE_KEY repo secret.
          # The optional password protecting the key goes in TAURI_SIGNING_PRIVATE_KEY_PASSWORD.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          # tagName is taken from the git tag (e.g. v0.1.0).
          tagName: ${{ github.ref_name }}
          releaseName: "Old People Loadin' ${{ github.ref_name }}"
          releaseBody: |
            See [RELEASE.md](https://github.com/vbonduro/epubl/blob/main/RELEASE.md) for upgrade instructions.
          releaseDraft: false
          prerelease: false
          # Restrict to the Windows NSIS installer only.
          args: --target x86_64-pc-windows-msvc --bundles nsis
